<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Quiz - Ley de Gauss</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .quiz-embedded {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            border-radius: 12px;
            padding: 5px;
        }

        .question-card {
            background: white;
            padding: 5px;
        }

        .question-text {
            font-size: 1em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e67e22;
            color: #2c3e50;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #ecf0f1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .option:hover {
            background: #d5dbdb;
        }

        .option.selected {
            background: #d35400;
            color: white;
        }

        .option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85em;
            transition: all 0.2s;
        }

        .btn-check {
            background: #27ae60;
            color: white;
        }

        .btn-check:hover {
            background: #229954;
        }

        .btn-reset {
            background: #7f8c8d;
            color: white;
        }

        .btn-reset:hover {
            background: #6c7a7a;
        }

        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            font-size: 0.85em;
        }

        .feedback.correct {
            display: block;
            background: #d5f5e3;
            border-left: 4px solid #27ae60;
            color: #1e8449;
        }

        .feedback.incorrect {
            display: block;
            background: #fadbd8;
            border-left: 4px solid #e74c3c;
            color: #922b21;
        }

        .feedback h4 {
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .progress-bar {
            background: #ecf0f1;
            border-radius: 8px;
            height: 6px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            background: #e67e22;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .score {
            text-align: center;
            font-size: 0.85em;
            margin-top: 10px;
            color: #2c3e50;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            gap: 10px;
        }

        .nav-btn {
            background: #2c3e50;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .nav-btn:hover {
            background: #1a252f;
        }
    </style>
</head>
<body>
<div class="quiz-embedded">
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="questionArea"></div>
    <div class="score" id="scoreDisplay"></div>
</div>

<script>
    // ==================== PREGUNTAS ====================
    const questions = [
        {
            text: "❓ Si de una superficie cerrada salen más líneas de campo eléctrico que las que entran, ¿la carga neta encerrada es positiva?",
            type: "vf",
            correct: "V",
            explanation: "✅ Correcto. Por la Ley de Gauss, el flujo neto es proporcional a la carga encerrada. Si salen más líneas (flujo positivo), la carga neta encerrada es positiva."
        },
        {
            text: "❓ Si el flujo eléctrico a través de una superficie cerrada es nulo, ¿se puede afirmar que el campo eléctrico es cero en todos los puntos?",
            type: "vf",
            correct: "F",
            explanation: "❌ Incorrecto. Flujo nulo no implica campo nulo en toda la superficie. Puede haber campo entrante y saliente que se cancele."
        },
        {
            text: "❓ Si el flujo eléctrico a través de una superficie cerrada es nulo, ¿necesariamente no hay partículas cargadas encerradas?",
            type: "vf",
            correct: "F",
            explanation: "❌ Incorrecto. El flujo neto puede ser nulo si hay cargas positivas y negativas encerradas cuya suma sea cero."
        },
        {
            text: "📌 Una carga de 8 μC está en el centro de un cubo. El flujo total a través del cubo es:",
            type: "multiple",
            options: ["a) 8 μC/ε₀", "b) Cero", "c) Depende del tamaño", "d) 8 μC/(6ε₀)"],
            correct: "a",
            explanation: "✅ Correcto. Por Ley de Gauss, el flujo total solo depende de la carga encerrada: Φ = q/ε₀."
        },
        {
            text: "📌 Se coloca una carga q cerca de una esfera conductora neutra. ¿Flujo a través de una superficie que ENCIERRA solo la esfera?",
            type: "multiple",
            options: ["a) q/ε₀", "b) Cero", "c) Depende de la posición", "d) q/(2ε₀)"],
            correct: "b",
            explanation: "✅ Correcto. La esfera es neutra (carga neta = 0). Por Ley de Gauss, flujo = 0. La carga externa no afecta."
        },
        {
            text: "❓ Para un cubo con una carga en su centro, ¿el flujo a través de cada cara es el mismo (q/(6ε₀))?",
            type: "vf",
            correct: "V",
            explanation: "✅ Correcto. Por simetría, la carga en el centro produce flujo igual a través de cada una de las 6 caras."
        },
        {
            text: "❓ Si cambiamos de posición las cargas dentro de una superficie cerrada, el flujo neto cambia.",
            type: "vf",
            correct: "F",
            explanation: "❌ Incorrecto. El flujo neto solo depende de la carga total encerrada, no de su posición."
        }
    ];

    let currentIndex = 0;
    let userAnswers = new Array(questions.length).fill(null);

    const questionArea = document.getElementById("questionArea");
    const progressFill = document.getElementById("progressFill");
    const scoreDisplay = document.getElementById("scoreDisplay");

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        const percent = (answered / questions.length) * 100;
        progressFill.style.width = `${percent}%`;
        let correct = 0;
        for (let i = 0; i < questions.length; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) correct++;
        }
        scoreDisplay.innerHTML = `📊 Progreso: ${answered}/${questions.length} | ✅ Aciertos: ${correct}`;
        return correct;
    }

    function render() {
        if (currentIndex >= questions.length) {
            const correct = updateProgress();
            questionArea.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <h3>🎉 ¡Cuestionario completado!</h3>
                    <p style="font-size: 1.3em; margin: 15px 0;">Puntaje: ${correct} / ${questions.length}</p>
                    <button class="btn btn-reset" onclick="resetQuiz()">🔄 Reiniciar</button>
                </div>
            `;
            return;
        }

        const q = questions[currentIndex];
        const saved = userAnswers[currentIndex];

        let optionsHtml = "";
        if (q.type === "vf") {
            optionsHtml = `
                <div class="options">
                    <div class="option ${saved === 'V' ? 'selected' : ''}" data-value="V">
                        <input type="radio" name="q" value="V" id="v" ${saved === 'V' ? 'checked' : ''}>
                        <label for="v">✅ Verdadero</label>
                    </div>
                    <div class="option ${saved === 'F' ? 'selected' : ''}" data-value="F">
                        <input type="radio" name="q" value="F" id="f" ${saved === 'F' ? 'checked' : ''}>
                        <label for="f">❌ Falso</label>
                    </div>
                </div>
            `;
        } else {
            optionsHtml = `<div class="options">`;
            q.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(97 + idx);
                optionsHtml += `
                    <div class="option ${saved === letter ? 'selected' : ''}" data-value="${letter}">
                        <input type="radio" name="q" value="${letter}" id="${letter}" ${saved === letter ? 'checked' : ''}>
                        <label for="${letter}">${opt}</label>
                    </div>
                `;
            });
            optionsHtml += `</div>`;
        }

        let feedbackHtml = "";
        if (saved !== null) {
            const isCorrect = (saved === q.correct);
            feedbackHtml = `
                <div class="feedback ${isCorrect ? 'correct' : 'incorrect'}">
                    <h4>${isCorrect ? '✓ Correcto' : '✗ Incorrecto'}</h4>
                    <p>${q.explanation}</p>
                </div>
            `;
        }

        const html = `
            <div class="question-card">
                <div class="question-text">
                    <strong>${currentIndex + 1}/${questions.length}</strong><br>
                    ${q.text}
                </div>
                ${optionsHtml}
                <div class="btn-group">
                    <button class="btn btn-check" id="checkBtn">🔍 Verificar</button>
                    ${currentIndex < questions.length - 1 ? 
                        '<button class="btn btn-reset" id="nextBtn">⏩ Siguiente</button>' : 
                        '<button class="btn btn-reset" id="finishBtn">🏁 Finalizar</button>'}
                </div>
                ${feedbackHtml}
            </div>
        `;

        questionArea.innerHTML = html;

        // Eventos selección
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                const radio = opt.querySelector('input');
                if (radio) radio.checked = true;
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                const val = opt.getAttribute('data-value');
                userAnswers[currentIndex] = val;
                updateProgress();
                render();
            });
        });

        document.getElementById("checkBtn")?.addEventListener("click", () => {
            if (userAnswers[currentIndex] === null) {
                alert("⚠️ Selecciona una respuesta primero.");
                return;
            }
            render();
        });

        const nextBtn = document.getElementById("nextBtn");
        if (nextBtn) {
            nextBtn.addEventListener("click", () => {
                if (userAnswers[currentIndex] === null) {
                    alert("⚠️ Responde antes de continuar.");
                    return;
                }
                currentIndex++;
                render();
                updateProgress();
            });
        }

        const finishBtn = document.getElementById("finishBtn");
        if (finishBtn) {
            finishBtn.addEventListener("click", () => {
                if (userAnswers[currentIndex] === null) {
                    alert("⚠️ Responde antes de finalizar.");
                    return;
                }
                currentIndex = questions.length;
                render();
                updateProgress();
            });
        }
    }

    window.resetQuiz = function() {
        userAnswers.fill(null);
        currentIndex = 0;
        updateProgress();
        render();
    };

    updateProgress();
    render();
</script>
</body>
</html>
